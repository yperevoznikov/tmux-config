# set timeouts so vim will interact faster
set -sg escape-time 1

# Window options
setw -g monitor-activity off
setw -g automatic-rename off

# clock
# set-window-option -g clock-mode-colour colour64

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'dracula/tmux'
# set -g @plugin 'tmux-plugins/tmux-sensible'

# Drakula theme tweaks (https://draculatheme.com/tmux)
set -g @dracula-show-powerline true
set -g @dracula-fixed-location "Tbilisi"
set -g @dracula-show-fahrenheit false
set -g @dracula-plugins "git" # cpu-usage ram-usage weather time
set -g @dracula-cpu-usage-colors "cyan dark_gray"
set -g @dracula-show-timezone false
set -g @dracula-military-time true
set -g @dracula-show-flags true
set -g @dracula-show-left-icon session
set -g status-position top

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

